		function pushMsg(pname, pleave, pstartdate, penddate, pstarttime, pendtime) {
			var NowDate=new Date();
			var NowYear=NowDate.getFullYear();
			var NowMonth=NowDate.getMonth()+1;
			var NowDay=NowDate.getDate();
			var Arystartdate = pstartdate.split('-');
			var Aryenddate = penddate.split('-');
			var Arystarttime = pstarttime.split(':');
			var Aryendtime = pendtime.split(':');
			var SEyear = Number(Aryenddate[0]) - Number(Arystartdate[0]);	
			var SEmouth = Number(Aryenddate[1]) - Number(Arystartdate[1]);
			var SEday = Number(Aryenddate[2]) - Number(Arystartdate[2]);
			var ConDay = Number(Arystartdate[1]) - NowMonth;
			if(pleave == '特休' || pleave == '婚假' || pleave == '分娩假' || pleave == '產檢假' || pleave == '喪假(父母、養父母、繼父母、配偶喪亡者)' || pleave == '喪假(祖父母、子女、配偶之父母、配偶之養父母或繼父母喪亡者)' || pleave == '喪假(曾祖父母、兄弟姊妹、配偶之祖父母喪亡者)'){
				pstarttime='08:00';
				pendtime='17:00';
			}
			if (pname == '' || pstartdate == '' || penddate == '' || pstarttime == '' || pendtime == '') {  //資料檢查
				alert('每個項目都必須輸入！');
				return;
			}
			if (Arystartdate[0] > Aryenddate[0]){
				alert('起始年份不能大於結束年份！');
				return;				
			}
			if (SEmouth > 1){
				alert('月份錯誤,不可小於現在月份安排請假！');
				return;			
			}
			// 檢查並調整起始時間
			var startHour = Number(Arystarttime[0]);
			var startMinute = Number(Arystarttime[1]);
			
			// 如果時間在0:00-8:00之間（不包括8:00），自動調整為8:00
			if (startHour < 8) {
				pstarttime = '08:00';
				Arystarttime = ['08', '00'];
				startHour = 8;
				startMinute = 0;
			}
			// 如果時間在17:00-23:59之間（不包括17:00），自動調整為17:00
			else if (startHour > 17 || (startHour == 17 && startMinute > 0)) {
				pstarttime = '17:00';
				Arystarttime = ['17', '00'];
				startHour = 17;
				startMinute = 0;
			}
			// 檢查起始分鐘是否為0或30
			else if (startMinute != 0 && startMinute != 30){
				alert('起始分鐘只能選擇0或30！');
				return;
			}
			
			// 檢查並調整結束時間
			var endHour = Number(Aryendtime[0]);
			var endMinute = Number(Aryendtime[1]);
			
			// 如果時間在0:00-8:00之間（不包括8:00），自動調整為8:00
			if (endHour < 8) {
				pendtime = '08:00';
				Aryendtime = ['08', '00'];
				endHour = 8;
				endMinute = 0;
			}
			// 如果時間在17:00-23:59之間（不包括17:00），自動調整為17:00
			else if (endHour > 17 || (endHour == 17 && endMinute > 0)) {
				pendtime = '17:00';
				Aryendtime = ['17', '00'];
				endHour = 17;
				endMinute = 0;
			}
			// 檢查結束分鐘是否為0或30
			else if (endMinute != 0 && endMinute != 30){
				alert('結束分鐘只能選擇0或30！');
				return;
			}
			
			// 檢查結束時間不能超過起始時間
			var startTimeMinutes = startHour * 60 + startMinute;
			var endTimeMinutes = endHour * 60 + endMinute;
			
			if (endTimeMinutes <= startTimeMinutes) {
				alert('結束時間不能小於或等於起始時間！');
				return;
			}
			
			/*else if (Arystartdate[2] > Aryenddate[2]){
				alert('起始日期不能大於結束日期！');
				return;					
			}*/else if (Arystarttime[0] > Aryendtime[0]){
				alert('起始時間不能大於結束時間！');
				return;					
			/*}else if (Arystarttime[1] > Aryendtime[1]){
				alert('起始時間不能大於結束時間！');
				return;	*/				
			}else if (pleave == '生理假' && SEday > 1 || SEmouth > 1){
				alert('生理假一個月不可請超過一天！');
				return;			
			}/*else if(NowYear != Number(Arystartdate[0]) ){
				alert('年份錯誤,不可跨年安排請假！');
				return;						
			}else if(ConDay > 1 ){		
				alert('月份錯誤,已超出可請月份請重新安排請假！');
				return;	
			}*/else{
				var msg = "臨時請假";  //回傳訊息字串
				msg = msg + pname + "/";
				msg = msg + pleave + "/";
				msg = msg + pstartdate + "/";
				msg = msg + penddate + "/";
				msg = msg + pstarttime + "/";
				msg = msg + pendtime + "/";
				msg = msg + Arystartdate[0] + "/";
				msg = msg + Arystartdate[1] + "/";
				msg = msg + Arystartdate[2];
				liff.sendMessages([  //推播訊息
					{
						type: "text",
						text: msg
					}
				])
					.then(() => {
						liff.closeWindow();  //關閉視窗
					})
			}
			
		}
	   window.onload = function () {
	   /*document.getElementById("t0").value= document.getElementById("t0").value+"xx"+JSON.stringify(liff);*/
			liff
				.init({

			// 限制起始時間只能選擇0或30分鐘，並自動調整範圍外的時間
			$('#starttime').on('change', function() {
				var timeValue = $(this).val();
				if (timeValue) {
					var timeParts = timeValue.split(':');
					var hour = parseInt(timeParts[0]);
					var minute = parseInt(timeParts[1]);
					var adjustedTime = '';
					var needAlert = false;
					
					// 如果時間在0:00-8:00之間（不包括8:00），自動調整為8:00
					if (hour < 8) {
						adjustedTime = '08:00';
						$(this).val(adjustedTime);
						needAlert = true;
					}
					// 如果時間在17:00-23:59之間（不包括17:00），自動調整為17:00
					else if (hour > 17 || (hour == 17 && minute > 0)) {
						adjustedTime = '17:00';
						$(this).val(adjustedTime);
						needAlert = true;
					}
					// 檢查分鐘是否為0或30，如果不是則自動調整
					else if (minute != 0 && minute != 30) {
						// 如果分鐘小於30，設為0；否則設為30
						var adjustedMinute = minute < 30 ? 0 : 30;
						adjustedTime = (hour < 10 ? '0' : '') + hour + ':' + (adjustedMinute < 10 ? '0' : '') + adjustedMinute;
						$(this).val(adjustedTime);
						needAlert = true;
					}
					
					if (needAlert && adjustedTime) {
						alert('起始時間已自動調整為 ' + adjustedTime);
					}
					
					// 檢查結束時間是否超過起始時間
					var endTimeValue = $('#endtime').val();
					if (endTimeValue) {
						var endTimeParts = endTimeValue.split(':');
						var endHour = parseInt(endTimeParts[0]);
						var endMinute = parseInt(endTimeParts[1]);
						var finalStartTime = adjustedTime || timeValue;
						var finalStartParts = finalStartTime.split(':');
						var finalStartHour = parseInt(finalStartParts[0]);
						var finalStartMinute = parseInt(finalStartParts[1]);
						
						var startTimeMinutes = finalStartHour * 60 + finalStartMinute;
						var endTimeMinutes = endHour * 60 + endMinute;
						
						if (endTimeMinutes <= startTimeMinutes) {
							alert('結束時間不能小於或等於起始時間！請重新選擇結束時間。');
							$('#endtime').val('');
						}
					}
				}
			});
			
			// 限制結束時間只能選擇0或30分鐘，並自動調整範圍外的時間
			$('#endtime').on('change', function() {
				var timeValue = $(this).val();
				if (timeValue) {
					var timeParts = timeValue.split(':');
					var hour = parseInt(timeParts[0]);
					var minute = parseInt(timeParts[1]);
					var adjustedTime = '';
					var needAlert = false;
					
					// 如果時間在0:00-8:00之間（不包括8:00），自動調整為8:00
					if (hour < 8) {
						adjustedTime = '08:00';
						$(this).val(adjustedTime);
						needAlert = true;
					}
					// 如果時間在17:00-23:59之間（不包括17:00），自動調整為17:00
					else if (hour > 17 || (hour == 17 && minute > 0)) {
						adjustedTime = '17:00';
						$(this).val(adjustedTime);
						needAlert = true;
					}
					// 檢查分鐘是否為0或30，如果不是則自動調整
					else if (minute != 0 && minute != 30) {
						// 如果分鐘小於30，設為0；否則設為30
						var adjustedMinute = minute < 30 ? 0 : 30;
						adjustedTime = (hour < 10 ? '0' : '') + hour + ':' + (adjustedMinute < 10 ? '0' : '') + adjustedMinute;
						$(this).val(adjustedTime);
						needAlert = true;
					}
					
					if (needAlert && adjustedTime) {
						alert('結束時間已自動調整為 ' + adjustedTime);
					}
					
					// 檢查結束時間不能超過起始時間
					var startTimeValue = $('#starttime').val();
					if (startTimeValue) {
						var startTimeParts = startTimeValue.split(':');
						var startHour = parseInt(startTimeParts[0]);
						var startMinute = parseInt(startTimeParts[1]);
						var finalEndTime = adjustedTime || timeValue;
						var finalEndParts = finalEndTime.split(':');
						var finalEndHour = parseInt(finalEndParts[0]);
						var finalEndMinute = parseInt(finalEndParts[1]);
						
						var startTimeMinutes = startHour * 60 + startMinute;
						var endTimeMinutes = finalEndHour * 60 + finalEndMinute;
						
						if (endTimeMinutes <= startTimeMinutes) {
							alert('結束時間不能小於或等於起始時間！請重新選擇結束時間。');
							$(this).val('');
						}
					}
				}
			});
			
			$('#sure').click(function (e) {  //按下確定鈕
				pushMsg($('#name').val(), $('#leave').val(), $('#startdate').val(), $('#enddate').val(), $('#starttime').val(), $('#endtime').val());
			});
			$('#sure_vietnamese').click(function (e) {  //按下確定鈕
				pushMsg($('#name').val(), $('#leave_vietnamese').val(), $('#startdate').val(), $('#enddate').val(), $('#starttime').val(), $('#endtime').val());
			});
		};
